apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
  namespace: streaming-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: admin-service
          image: "{{ .Values.imageRegistry }}/{{ .Values.adminService.image }}:{{ .Values.adminService.tag }}"
          ports:
            - containerPort: {{ .Values.adminService.port }}
          env:
            - name: PORT
              value: "{{ .Values.adminService.port }}"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: streaming-app-config
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: streaming-app-secrets
                  key: jwt-secret
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: streaming-app-config
                  key: aws-region
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: streaming-app-config
                  key: aws-s3-bucket
            - name: AWS_CDN_URL
              valueFrom:
                configMapKeyRef:
                  name: streaming-app-config
                  key: aws-cdn-url
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: streaming-app-config
                  key: client-url
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: streaming-app
spec:
  ports:
    - port: {{ .Values.adminService.port }}
      targetPort: {{ .Values.adminService.port }}
  selector:
    app: admin-service